<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#0b0f0a; --panel2:#0e130d; --ink:#d6e8c8; --ink-dim:#8fa882;
    --green:#39ff5a; --green-dim:#2bbf45; --amber:#ffb84d; --blue:#7fd1ff; --red:#ff6b6b;
    --line:#1f2a18;
    --mono:"Cascadia Code",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0}
  html,body{background:var(--bg)}
  .banner{width:1200px;height:340px;position:relative;overflow:hidden;background:var(--bg);
    background-image:radial-gradient(900px 500px at 82% -20%, rgba(57,255,90,.10), transparent),
                     radial-gradient(700px 420px at -8% 120%, rgba(127,209,255,.06), transparent);
    font-family:var(--mono);display:flex;flex-direction:column;justify-content:flex-start;padding:62px 64px 0}
  /* scanline texture */
  .banner::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,.16) 3px 4px);pointer-events:none;opacity:.35}

  .eyebrow{font-size:14px;letter-spacing:.34em;text-transform:uppercase;color:var(--green-dim);margin-bottom:10px;position:relative}
  h1{font-size:74px;line-height:1;color:#eafff0;text-shadow:0 0 26px rgba(57,255,90,.4);position:relative;letter-spacing:1px}
  h1 .cur{color:var(--green)}
  .tag{font-size:21px;color:var(--ink-dim);margin-top:14px;position:relative}
  .tag b{color:var(--ink)}

  /* two-session relay motif, top-right — Architect <-> Executor via relay files */
  .relay{position:absolute;right:64px;top:58px;display:flex;align-items:center;gap:10px}
  .node{font-size:13px;padding:5px 13px;border-radius:6px;border:1px solid var(--green-dim);color:var(--green);box-shadow:0 0 10px rgba(57,255,90,.18)}
  .node.exec{border-color:var(--blue);color:var(--blue);box-shadow:0 0 10px rgba(127,209,255,.18)}
  .link{display:flex;flex-direction:column;align-items:center;color:var(--ink-dim);font-size:11px;line-height:1.25}
  .link .a{color:var(--green)}
  .link .b{color:var(--blue)}

  /* a glowing command-line rule near the bottom with a blinking prompt */
  .rail{position:absolute;left:0;right:0;bottom:46px;height:3px;
    background:linear-gradient(90deg,transparent,var(--green-dim) 12%,var(--green) 50%,var(--green-dim) 88%,transparent);
    box-shadow:0 0 10px rgba(57,255,90,.5)}
  .prompt{position:absolute;left:64px;bottom:18px;font-size:15px;color:var(--ink-dim)}
  .prompt .pct{color:var(--green)}
  .prompt b{color:var(--ink)}
</style>
</head>
<body>
<div class="banner">
  <div class="relay">
    <span class="node">ARCHITECT</span>
    <span class="link"><span class="a">task ▸</span><span class="b">◂ result</span></span>
    <span class="node exec">EXECUTOR</span>
  </div>

  <div class="eyebrow">architect · executor · relay</div>
  <h1>orfi-ae-kit<span class="cur">_</span></h1>
  <div class="tag">Two sessions, one loop — <b>you hold the pen</b>.</div>

  <div class="rail"></div>
  <div class="prompt"><span class="pct">%</span> /orfi-ae-kit-orient-architect&nbsp;&nbsp;<b>—</b>&nbsp;&nbsp;claude code · opencode · copilot cli</div>
</div>
</body>
</html>
